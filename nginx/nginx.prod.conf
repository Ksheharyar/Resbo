worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 150m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=tracking:10m rate=100r/s;

    # Use Docker's internal DNS resolver so container IPs are re-resolved
    # after containers are recreated during deployments
    resolver 127.0.0.11 valid=10s ipv6=off;

    # HTTP -> HTTPS redirect
    server {
        listen 80;
        server_name yeb.mail.intellimix.online;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;
        server_name yeb.mail.intellimix.online;

        ssl_certificate /etc/letsencrypt/live/yeb.mail.intellimix.online/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yeb.mail.intellimix.online/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Variables force nginx to re-resolve DNS on every request
        set $api_upstream http://server:3001;
        set $client_upstream http://client:80;

        # CSV import — large files, long processing (280K+ rows)
        location /api/v1/contacts/import-csv {
            limit_req zone=api burst=5 nodelay;
            proxy_pass $api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
            proxy_send_timeout 300s;
            client_max_body_size 150m;
        }

        # API
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass $api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Tracking (high throughput)
        location /api/v1/t/ {
            limit_req zone=tracking burst=200 nodelay;
            proxy_pass $api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Webhooks
        location /api/v1/webhooks/ {
            proxy_pass $api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Client — static assets (hashed filenames) are cached forever
        location /assets/ {
            proxy_pass $client_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Client — HTML pages must never be cached (they reference hashed JS/CSS)
        location / {
            proxy_pass $client_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
        }

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }
}
